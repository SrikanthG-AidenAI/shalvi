# Generated by the AIDAP portal — Docker build -> GHCR -> SSH deploy on EC2.
# Auto-deploys on push to main; also runnable manually / via the portal.
name: Deploy Shalvi app

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:      { description: "Git ref / tag / commit to deploy", required: false, default: "main" }
      environment:  { description: "Target environment", required: false, default: "demo" }
      host:         { description: "Target server host/ip (optional; falls back to DEPLOY_HOST secret)", required: false, default: "" }
      ssh_user:     { description: "SSH login user (optional; falls back to SSH_USER secret)", required: false, default: "" }
      container:    { description: "Container name on the host", required: false, default: "shalvi-app" }
      port:         { description: "Host port to publish the app on", required: false, default: "8000" }
      health_path:  { description: "HTTP health path", required: false, default: "/health" }
      rollback:     { description: "Is this a rollback run?", required: false, default: "false" }

concurrency:
  group: deploy-shalvi-app-${{ inputs.environment || 'demo' }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/srikanthg-aidenai/shalvi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push image to GHCR
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "image_ref=${IMAGE}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest     # use a self-hosted in-VPC runner for private IPs
    steps:
      - name: SSH setup
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST_IN: ${{ inputs.host }}
          USER_IN: ${{ inputs.ssh_user }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # Write the key EXACTLY: strip any CR (Windows) and guarantee a trailing newline.
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          if ! ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null 2>&1; then
            echo "::error::SSH_PRIVATE_KEY is not a valid private key. Paste the FULL key incl. the BEGIN/END lines and real newlines (an OpenSSH or PEM key), then re-run."
            exit 1
          fi
          HOST="${HOST_IN:-$DEPLOY_HOST}"; USER="${USER_IN:-$SSH_USER}"
          if [ -z "$HOST" ] || [ -z "$USER" ]; then
            echo "::error::DEPLOY_HOST and/or SSH_USER are not set. Add them as repo secrets (or pass host/ssh_user inputs)."
            exit 1
          fi
          echo "HOST=$HOST" >> "$GITHUB_ENV"
          echo "USER=$USER" >> "$GITHUB_ENV"
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH key loaded; target $USER@$HOST"
      - name: Deploy container (zero-downtime swap + health check)
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ inputs.container || 'shalvi-app' }}
          PORT: ${{ inputs.port || '8000' }}
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new $USER@$HOST"
          IMG="${{ needs.build.outputs.image_ref }}"
          # Remember the currently running image so we can roll back.
          PREV=$($SSH "docker inspect --format '{{.Config.Image}}' $NAME 2>/dev/null" || echo "")
          echo "previous image: ${PREV:-none}"
          $SSH "echo '$GHCR_TOKEN' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"
          $SSH "docker pull $IMG"
          # Runtime env: write locally (no heredoc indentation issues) then copy over.
          printf '%s\n' "$APP_ENV" > app.env
          scp -i ~/.ssh/id_deploy app.env "$USER@$HOST:/tmp/$NAME.env"
          $SSH "docker rm -f $NAME 2>/dev/null || true"
          $SSH "docker run -d --name $NAME --restart unless-stopped --env-file /tmp/$NAME.env -p ${PORT}:${PORT} $IMG"
          echo "PREV_IMAGE=$PREV" >> "$GITHUB_ENV"
      - name: Health check + auto-rollback
        env:
          NAME: ${{ inputs.container || 'shalvi-app' }}
          PORT: ${{ inputs.port || '8000' }}
          HEALTH_PATH: ${{ inputs.health_path || '/health' }}
        run: |
          set -uo pipefail
          SSH="ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new $USER@$HOST"
          URL="http://localhost:${PORT}${HEALTH_PATH}"
          ok=""
          for i in $(seq 1 12); do
            code=$($SSH "curl -s -o /dev/null -w '%{http_code}' --max-time 5 $URL" || echo 000)
            up=$($SSH "docker inspect -f '{{.State.Running}}' $NAME 2>/dev/null" || echo false)
            echo "attempt $i: http=$code running=$up"
            [ "$code" = "200" ] && [ "$up" = "true" ] && { ok=yes; break; }
            sleep 5
          done
          if [ -z "$ok" ]; then
            echo "::error::Health check failed - rolling back to ${PREV_IMAGE:-previous}."
            if [ -n "${PREV_IMAGE:-}" ]; then
              $SSH "docker rm -f $NAME 2>/dev/null || true; docker run -d --name $NAME --restart unless-stopped --env-file /tmp/$NAME.env -p ${PORT}:${PORT} $PREV_IMAGE"
            fi
            exit 1
          fi
          echo "Healthy."
      - name: Cleanup old images
        if: success()
        run: |
          SSH="ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new $USER@$HOST"
          $SSH "docker image prune -af --filter 'until=168h' >/dev/null 2>&1 || true"
