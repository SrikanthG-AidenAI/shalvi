# Generated by the AIDAP portal — Docker build -> GHCR -> AWS SSM deploy (no SSH).
# Auto-deploys on push to main; also runnable manually / via the portal.
name: Deploy Shalvi app

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:      { description: "Git ref / tag / commit to deploy", required: false, default: "main" }
      environment:  { description: "Target environment", required: false, default: "demo" }
      instance_id:  { description: "Target EC2 instance id (falls back to INSTANCE_ID secret)", required: false, default: "" }
      container:    { description: "Container name on the host", required: false, default: "shalvi-app" }
      port:         { description: "Host port to publish the app on", required: false, default: "3000" }
      health_path:  { description: "HTTP health path", required: false, default: "/health" }

concurrency:
  group: deploy-shalvi-app-${{ inputs.environment || 'demo' }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/srikanthg-aidenai/shalvi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push image to GHCR
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "image_ref=${IMAGE}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: echo "Pushed image ${{ steps.meta.outputs.image_ref }} to ghcr.io/srikanthg-aidenai/shalvi"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Deploy via AWS SSM (Run Command)
        env:
          IMG: ${{ needs.build.outputs.image_ref }}
          INSTANCE_ID: ${{ inputs.instance_id || secrets.INSTANCE_ID }}
          NAME: ${{ inputs.container || 'shalvi-app' }}
          PORT: ${{ inputs.port || '3000' }}
          HEALTH_PATH: ${{ inputs.health_path || '/health' }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          set -euo pipefail
          [ -n "$INSTANCE_ID" ] || { echo "::error::INSTANCE_ID not set. Add it as a repo secret or pass the instance_id input."; exit 1; }
          ENV_B64=$(printf '%s\n' "$APP_ENV" | base64 -w0)
          # Header carries concrete values (expanded here); body is static (runs on the instance).
          printf "%s\n" "IMG='$IMG'; NAME='$NAME'; PORT='$PORT'; HP='$HEALTH_PATH'; GHU='$GHCR_USER'; GHT='$GHCR_TOKEN'; ENV_B64='$ENV_B64'" > remote.sh
          cat >> remote.sh <<'REOF'
          set -e
          echo "$GHT" | docker login ghcr.io -u "$GHU" --password-stdin
          docker pull "$IMG"
          PREV=$(docker inspect --format '{{.Config.Image}}' "$NAME" 2>/dev/null || echo "")
          echo "$ENV_B64" | base64 -d > "/tmp/$NAME.env"
          docker rm -f "$NAME" 2>/dev/null || true
          docker run -d --name "$NAME" --restart unless-stopped --env-file "/tmp/$NAME.env" -p "$PORT:$PORT" "$IMG"
          ok=""
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://localhost:$PORT$HP" || echo 000)
            up=$(docker inspect -f '{{.State.Running}}' "$NAME" 2>/dev/null || echo false)
            echo "attempt $i: http=$code running=$up"
            [ "$code" = "200" ] && [ "$up" = "true" ] && { ok=yes; break; }
            sleep 5
          done
          if [ -z "$ok" ]; then
            echo "health check failed - rolling back"
            if [ -n "$PREV" ]; then docker rm -f "$NAME" 2>/dev/null || true; docker run -d --name "$NAME" --restart unless-stopped --env-file "/tmp/$NAME.env" -p "$PORT:$PORT" "$PREV"; fi
            exit 1
          fi
          echo "Healthy."
          REOF
          REMOTE_B64=$(base64 -w0 remote.sh)
          CMD_ID=$(aws ssm send-command --instance-ids "$INSTANCE_ID" --document-name "AWS-RunShellScript" --comment "AIDAP deploy $NAME" --parameters commands="echo $REMOTE_B64 | base64 -d | bash" --query "Command.CommandId" --output text)
          echo "SSM CommandId: $CMD_ID on $INSTANCE_ID"
          ST=Pending
          for i in $(seq 1 60); do
            ST=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
            case "$ST" in Success|Failed|Cancelled|TimedOut) break;; esac
            sleep 5
          done
          echo "----- instance stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text || true
          echo "----- instance stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text || true
          echo "SSM status: $ST"
          [ "$ST" = "Success" ] || { echo "::error::SSM deploy failed ($ST)"; exit 1; }
